name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run unit tests (no toolexec)
        run: go test ./internal/... ./pkg/...

      - name: Run unit tests with -race
        run: go test -race ./internal/... ./pkg/...

      - name: Install rewire binary
        run: go install ./cmd/rewire/

      - name: Run toolexec tests
        run: |
          # `go clean -cache` wipes whichever cache $GOCACHE points at,
          # so we set our rewire-test GOCACHE before cleaning.
          GOCACHE="$HOME/.cache/rewire-test" go clean -cache
          GOFLAGS="-toolexec=rewire" GOCACHE="$HOME/.cache/rewire-test" go test ./example/... -count=1

      - name: Run toolexec tests with -race
        run: |
          # Separate cache dir from the non-race run. Race-instrumented
          # .a files have different cache keys, so they'd just bloat a
          # shared cache rather than break anything, but isolating
          # keeps the numbers clean. This step is regression protection
          # for the importcfg fingerprint-mismatch bug we fixed by
          # propagating -race/-msan/-asan to `go list -export`.
          GOCACHE="$HOME/.cache/rewire-test-race" go clean -cache
          GOFLAGS="-toolexec=rewire" GOCACHE="$HOME/.cache/rewire-test-race" go test -race ./example/... -count=1

      - name: Verify inlining of rewire wrappers
        run: scripts/check-inlining.sh
