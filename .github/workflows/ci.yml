name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run unit tests (no toolexec)
        run: go test ./internal/... ./pkg/...

      - name: Run unit tests with -race
        run: go test -race ./internal/... ./pkg/...

      - name: Install rewire binary
        run: go install ./cmd/rewire/

      - name: Run toolexec tests
        run: |
          # `go clean -cache` wipes whichever cache $GOCACHE points at,
          # so we set our rewire-test GOCACHE before cleaning.
          GOCACHE="$HOME/.cache/rewire-test" go clean -cache
          GOFLAGS="-toolexec=rewire" GOCACHE="$HOME/.cache/rewire-test" go test ./example/... -count=1

      - name: Run toolexec tests with -race
        run: |
          # Separate cache dir from the non-race run. Race-instrumented
          # .a files have different cache keys, so they'd just bloat a
          # shared cache rather than break anything, but isolating
          # keeps the numbers clean. This step is regression protection
          # for the importcfg fingerprint-mismatch bug we fixed by
          # propagating -race/-msan/-asan to `go list -export`.
          GOCACHE="$HOME/.cache/rewire-test-race" go clean -cache
          GOFLAGS="-toolexec=rewire" GOCACHE="$HOME/.cache/rewire-test-race" go test -race ./example/... -count=1

      - name: Verify inlining of rewire wrappers
        # Disabled on this draft branch: the goroutine-local dispatch
        # head (labels pointer read + sync.Map.Load + type assertion +
        # a body-less linkname call) pushes wrapper cost from ~5 to
        # ~300, over Go's 80 inline budget. Wrappers no longer inline.
        # Behavior tests in example/foo/inlining_test.go still pass
        # (mocks take effect regardless of wrapper inlining); only
        # the empirical "wrapper inlines" claim this script defends
        # is no longer true here. Accepted regression for the
        # prototype. Documented in plans/parallel_test_safety_findings.md.
        if: false
        run: scripts/check-inlining.sh

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Generate version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Calculate new version - increment patch version
          IFS='.' read -r major minor patch <<< "${LATEST_TAG/v/}"
          NEW_VERSION="v$major.$minor.$((patch+1))"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Creating new version: $NEW_VERSION"

      - name: Create tag
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -a ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
