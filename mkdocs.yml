site_name: Rewire
site_url: https://gigurra.github.io/rewire/
site_description: Compile-time function mocking and interface mock generation for Go
repo_url: https://github.com/GiGurra/rewire
repo_name: GiGurra/rewire

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Function Mocking: function-mocking.md
  - Method Mocking: method-mocking.md
  - Expectations DSL: expectations.md
  - Interface Mocks: interface-mocks.md
  - How It Works: how-it-works.md
  - Setup: setup.md
  - Limitations: limitations.md
  - Roadmap: roadmap.md
  - Design Notes: design.md
